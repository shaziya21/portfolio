<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Portfolio Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="auth-subtitle">Sign up to manage your portfolio experiences.</p>

      <div id="auth-alert" class="alert alert-error hidden"></div>

      <form id="signup-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="8" placeholder="Minimum 8 characters">
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
      </p>
      <p class="auth-footer" style="margin-top: 1rem;">
        <a href="/">← Back to portfolio</a>
      </p>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
